name: Python checks

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q qq_message_manager main.py
      - name: Import application patches
        run: python -c "import qq_message_manager.app"
      - name: Test automation scheduling, message buffer, storage, import and delivery helpers
        run: |
          python - <<'PY'
          import csv
          import json
          import tempfile
          from datetime import datetime
          from pathlib import Path
          from types import SimpleNamespace

          from openpyxl import load_workbook

          from qq_message_manager.automation_file_import import read_artifact_records
          from qq_message_manager.automation_message_buffer import AutomationMessageBuffer
          from qq_message_manager.automation_models import (
              AutomationTask,
              TRANSFER_AUTO,
              TRANSFER_LOCAL,
              TRANSFER_STREAM,
              next_schedule_time,
          )
          from qq_message_manager.automation_record_context import install_automation_record_context
          from qq_message_manager.automation_stage3_reliability import _is_stream_progress
          from qq_message_manager.automation_stage3_transfer import (
              _extract_remote_file_path,
              _resolved_transfer_mode,
          )
          from qq_message_manager.models import ChatMessage
          import qq_message_manager.automation_storage as storage

          task = AutomationTask.create_default()
          task.name = "CI task"
          task.created_at = "2026-01-01T10:17:00"
          task.interval_seconds = 1800
          assert next_schedule_time(task, datetime(2026, 1, 1, 10, 18), include_now=False) == datetime(2026, 1, 1, 10, 47)
          assert task.file_transfer_mode == TRANSFER_AUTO
          task.file_transfer_mode = TRANSFER_STREAM
          restored = AutomationTask.from_dict(task.to_dict())
          assert restored.file_transfer_mode == TRANSFER_STREAM
          legacy = AutomationTask.from_dict({"task_id": "legacy", "name": "legacy"})
          assert legacy.file_transfer_mode == TRANSFER_AUTO

          assert _resolved_transfer_mode(SimpleNamespace(websocket_url="ws://127.0.0.1:3001"), TRANSFER_AUTO) == TRANSFER_LOCAL
          assert _resolved_transfer_mode(SimpleNamespace(websocket_url="ws://192.168.1.10:3001"), TRANSFER_AUTO) == TRANSFER_STREAM
          assert _extract_remote_file_path({"data": {"status": "file_complete", "file_path": "/tmp/a.xlsx"}}) == "/tmp/a.xlsx"
          assert _is_stream_progress({"type": "stream", "data_type": "data_chunk"})
          assert not _is_stream_progress({"type": "response", "data": {"file_path": "/tmp/a.xlsx"}})

          message_buffer = AutomationMessageBuffer()
          group_first = ChatMessage(
              session_id="group:123",
              session_name="测试群",
              session_kind="group",
              sender_id="10001",
              sender_name="甲",
              text="第一条实时问题",
              timestamp=datetime(2000, 1, 1),
              message_id="message-live-1",
          )
          private_message = ChatMessage(
              session_id="private:20001",
              session_name="好友",
              session_kind="private",
              sender_id="20001",
              sender_name="乙",
              text="私聊实时消息",
              message_id="message-private-1",
          )
          group_second = ChatMessage(
              session_id="group:123",
              session_name="测试群",
              session_kind="group",
              sender_id="10002",
              sender_name="丙",
              text="第二条实时问题",
              message_id="message-live-2",
          )
          historical = ChatMessage(
              session_id="group:123",
              session_name="测试群",
              session_kind="group",
              sender_id="10003",
              sender_name="丁",
              text="启动历史",
              historical=True,
              message_id="message-history-1",
          )
          scheduled = ChatMessage(
              session_id="group:123",
              session_name="测试群",
              session_kind="group",
              sender_id="scheduled_task",
              sender_name="定时任务",
              text="任务输出",
              outgoing=True,
          )
          assert message_buffer.record(group_first) == 1
          assert message_buffer.record(private_message) == 2
          assert message_buffer.record(group_second) == 3
          assert message_buffer.record(group_first) is None
          assert message_buffer.record(historical) is None
          assert message_buffer.record(scheduled) is None

          group_messages, group_upper, group_total = message_buffer.read_after("group:123", 0, 20)
          assert group_total == 2 and group_upper == 3
          assert [message.text for message in group_messages] == ["第一条实时问题", "第二条实时问题"]
          assert group_messages[0].timestamp.year != 2000
          assert group_messages[0].raw_event["_qqmm_buffer_sequence"] == 1

          later_messages, later_upper, later_total = message_buffer.read_after("group:123", 1, 20)
          assert later_total == 1 and later_upper == 3
          assert later_messages[0].text == "第二条实时问题"

          private_messages, private_upper, private_total = message_buffer.read_after("private:20001", 0, 20)
          assert private_total == 1 and private_upper == 2
          assert private_messages[0].text == "私聊实时消息"

          task.file_enabled = True
          task.file_format = "xlsx"
          task.file_name_template = "{date}_records.xlsx"
          task.dedup_fields = ["内容"]
          with tempfile.TemporaryDirectory() as temp_dir:
              storage.AUTOMATION_ROOT = Path(temp_dir)
              records, stats = storage.apply_operations(
                  task,
                  [],
                  [{
                      "action": "insert",
                      "values": {
                          "时间": "2026-01-01 10:20:00",
                          "人员": "测试用户",
                          "内容": "测试问题",
                          "状态": "待处理",
                      },
                      "source_message_ids": ["message-1"],
                  }],
              )
              assert stats["inserted"] == 1
              original_id = records[0]["record_id"]
              path = storage.write_artifact(task, datetime(2026, 1, 1).date(), records)
              assert path.is_file()

              workbook = load_workbook(path)
              sheet = workbook[task.sheet_name]
              content_column = [cell.value for cell in sheet[1]].index("内容") + 1
              sheet.cell(row=2, column=content_column, value="外部编辑后的问题")
              workbook.save(path)
              workbook.close()

              imported, recognized = read_artifact_records(path, task, storage)
              assert recognized
              assert imported[0]["record_id"] == original_id
              assert imported[0]["values"]["内容"] == "外部编辑后的问题"
              assert imported[0]["source_message_ids"] == ["message-1"]

              csv_path = Path(temp_dir) / "records.csv"
              with csv_path.open("w", encoding="utf-8-sig", newline="") as handle:
                  writer = csv.DictWriter(handle, fieldnames=[column.name for column in task.columns])
                  writer.writeheader()
                  writer.writerow({"时间": "2026-01-01 11:00:00", "人员": "甲", "内容": "CSV 问题", "状态": "待处理"})
              csv_rows, recognized = read_artifact_records(csv_path, task, storage)
              assert recognized and csv_rows[0]["values"]["内容"] == "CSV 问题"

              json_path = Path(temp_dir) / "records.json"
              json_path.write_text(json.dumps([{"时间": "2026-01-01 12:00:00", "人员": "乙", "内容": "JSON 问题", "状态": "待处理"}], ensure_ascii=False), encoding="utf-8")
              json_rows, recognized = read_artifact_records(json_path, task, storage)
              assert recognized and json_rows[0]["values"]["内容"] == "JSON 问题"

              md_path = Path(temp_dir) / "records.md"
              md_path.write_text("| 时间 | 人员 | 内容 | 状态 | 处理结果 |\n| --- | --- | --- | --- | --- |\n| 2026-01-01 13:00:00 | 丙 | Markdown 问题 | 待处理 | |\n", encoding="utf-8")
              md_rows, recognized = read_artifact_records(md_path, task, storage)
              assert recognized and md_rows[0]["values"]["内容"] == "Markdown 问题"

          fake_module = SimpleNamespace(records_for_ai=lambda records: records)
          install_automation_record_context(fake_module)
          many = [
              {
                  "record_id": f"row_{index}",
                  "values": {"内容": f"问题 {index}", "状态": "已完成"},
                  "source_message_ids": [],
              }
              for index in range(600)
          ]
          many[0]["values"]["状态"] = "待处理"
          selected = fake_module.records_for_ai(many)
          assert any(record["record_id"] == "row_0" for record in selected)
          assert len(json.dumps(selected, ensure_ascii=False)) <= 25000
          PY
