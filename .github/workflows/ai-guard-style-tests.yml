name: AI guard and style import tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile new feature modules
        run: |
          python -m compileall -q \
            qq_message_manager/ai_group_mute_guard.py \
            qq_message_manager/speaking_style_import.py \
            tests/test_ai_group_mute_guard.py \
            tests/test_speaking_style_import.py
      - name: Test group mute quota guard
        run: python tests/test_ai_group_mute_guard.py
      - name: Test speaking style import analysis
        run: python tests/test_speaking_style_import.py
      - name: Import complete application patch chain
        run: python -c "import qq_message_manager.app"
